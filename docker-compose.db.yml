services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-personal_website}
      POSTGRES_USER: ${POSTGRES_MIGRATION_USER:-migration_user}
      POSTGRES_PASSWORD: ${POSTGRES_MIGRATION_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_MIGRATION_USER:-migration_user} -d ${POSTGRES_DB:-personal_website}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-internal

  psql:
    image: postgres:15-alpine
    entrypoint: ["sh", "-lc", "sleep infinity"]
    networks:
      - app-internal
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  app-internal:
    driver: bridge
