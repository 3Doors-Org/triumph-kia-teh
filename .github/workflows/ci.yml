name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  quality-and-security:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: personal_website
          POSTGRES_USER: migration_user
          POSTGRES_PASSWORD: migration_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U migration_user -d personal_website"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.19.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.5
          cache: "pnpm"
          cache-dependency-path: |
            pnpm-lock.yaml
            web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Migration dry-run against ephemeral Postgres
        env:
          DATABASE_URL: postgresql://migration_user:migration_password@localhost:5432/personal_website
          MIGRATION_DATABASE_URL: postgresql://migration_user:migration_password@localhost:5432/personal_website
        run: pnpm --dir web db:migrate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Dependency audit (critical only)
        run: pnpm audit:deps

      - name: Secret scan (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
