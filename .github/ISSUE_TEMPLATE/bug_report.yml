name: Bug report
description: Report a reproducible defect in current behavior.
title: "[Bug]: "
labels: ["type:bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Clear description of the bug and expected behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Include exact steps and environment details.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: User-facing impact and severity.
    validations:
      required: true
  - type: checkboxes
    id: security
    attributes:
      label: Security check
      options:
        - label: I confirm this issue does not include credentials or sensitive data.
          required: true
